apiVersion: apps/v1
kind: Deployment
metadata:
  name: wsn-streamlit-deployment
  namespace: wsn-mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wsn-streamlit
  template:
    metadata:
      labels:
        app: wsn-streamlit
    spec:
      containers:
      - name: wsn-streamlit
        image: wsn-streamlit:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
        envFrom:
        - configMapRef:
            name: wsn-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
