name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Train Models
      run: |
        # Only runs if data.csv is present or we skip if not
        # python src/train.py
        echo "Training step here"

    - name: Run Tests
      run: |
        # pytest tests/
        echo "Pytest here"

    - name: Build Docker API Image
      run: |
        docker build -t wsn-api:latest -f Dockerfile.api .

    - name: Build Docker Streamlit Image
      run: |
        docker build -t wsn-streamlit:latest -f Dockerfile.streamlit .

    # Additional steps for pushing to Docker Hub would go here
