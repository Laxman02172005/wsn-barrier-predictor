name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Train Models
      run: |
        # Only runs if data.csv is present or we skip if not
        # python src/train.py
        echo "Training step here"

    - name: Run Tests
      run: |
        # pytest tests/
        echo "Pytest here"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker API Image
      run: |
        docker build -t sailaxman01/wsn-api:latest -f Dockerfile.api .
        docker push sailaxman01/wsn-api:latest

    - name: Build and Push Docker Streamlit Image
      run: |
        docker build -t sailaxman01/wsn-streamlit:latest -f Dockerfile.streamlit .
        docker push sailaxman01/wsn-streamlit:latest
