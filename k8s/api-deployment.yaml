apiVersion: apps/v1
kind: Deployment
metadata:
  name: wsn-api-deployment
  namespace: wsn-mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wsn-api
  template:
    metadata:
      labels:
        app: wsn-api
    spec:
      containers:
      - name: wsn-api
        image: sailaxman01/wsn-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: wsn-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
